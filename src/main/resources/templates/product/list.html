<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Products - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4">All Products</h2>

    <!-- Category filter pills -->
    <div class="mb-4">
        <a th:href="@{/products}" class="btn btn-outline-primary btn-sm me-1 mb-1">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/categories/{id}(id=${cat.id})}"
           th:text="${cat.name}"
           class="btn btn-outline-secondary btn-sm me-1 mb-1">Category</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${products}">
            <div class="card h-100 shadow-sm product-card">
                <div class="card-body d-flex flex-column">
                    <div class="text-center mb-3">
                        <i class="bi bi-phone fs-1 text-secondary"></i>
                    </div>
                    <span class="badge bg-secondary mb-2 align-self-start"
                          th:text="${product.category?.name}">Category</span>
                    <h6 class="card-title" th:text="${product.name}">Product</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold text-primary" th:text="'€' + ${product.price}">€0.00</span>
                        <div class="d-flex gap-1">
                            <form th:action="@{/cart/add}" method="post" sec:authorize="isAuthenticated()">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               class="btn btn-outline-primary btn-sm">View</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted fs-5">No products available yet.</p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

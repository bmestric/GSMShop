<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footer" class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 GSM Shop. All rights reserved.</p>
    </div>
</footer>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global toast container for flash messages -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;">
        <div th:if="${success}" class="toast align-items-center text-bg-success border-0 show"
             role="alert" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex">
                <div class="toast-body" th:text="${success}">Success</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div th:if="${error}" class="toast align-items-center text-bg-danger border-0 show"
             role="alert" data-bs-autohide="true" data-bs-delay="5000">
            <div class="d-flex">
                <div class="toast-body" th:text="${error}">Error</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script th:if="${success} or ${error}">
        document.querySelectorAll('.toast.show').forEach(function(el) {
            new bootstrap.Toast(el).show();
        });
    </script>
</div>
</html>

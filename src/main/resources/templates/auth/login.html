<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="card shadow" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Login</h3>

            <div th:if="${param.error}" class="alert alert-danger">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                You have been logged out.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email" class="form-control" id="username" name="username"
                           placeholder="your@email.com" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Don't have an account? <a th:href="@{/register}">Register</a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

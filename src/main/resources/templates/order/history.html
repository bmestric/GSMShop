<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Orders - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4">My Orders</h2>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <i class="bi bi-bag" style="font-size: 4rem; color: #6c757d;"></i>
        <p class="text-muted fs-5 mt-3">You haven't placed any orders yet.</p>
        <a th:href="@{/products}" class="btn btn-primary mt-2">Browse Products</a>
    </div>

    <div th:if="${!#lists.isEmpty(orders)}" class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Order #</th>
                <th>Date</th>
                <th>Payment</th>
                <th>Items</th>
                <th>Total</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="'#' + ${order.id}">-</td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">-</td>
                <td>
                    <span th:if="${order.paymentMethod.name() == 'CASH_ON_DELIVERY'}"
                          class="badge bg-success">COD</span>
                    <span th:if="${order.paymentMethod.name() == 'PAYPAL'}"
                          class="badge bg-warning text-dark">PayPal</span>
                </td>
                <td th:text="${#lists.size(order.items)}">0</td>
                <td class="fw-bold" th:text="'€' + ${order.totalAmount}">€0.00</td>
                <td>
                    <a th:href="@{/order-history/{id}(id=${order.id})}"
                       class="btn btn-outline-primary btn-sm">Details</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Order Details - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/order-history}">My Orders</a></li>
            <li class="breadcrumb-item active" th:text="'Order #' + ${order?.id}">Order</li>
        </ol>
    </nav>

    <div th:if="${order}">
        <div class="row">
            <!-- Order Info -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="'Order #' + ${order.id}">Order</h5>
                        <div class="mb-2">
                            <small class="text-muted">Date</small><br>
                            <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">-</span>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Payment</small><br>
                            <span th:if="${order.paymentMethod.name() == 'CASH_ON_DELIVERY'}"
                                  class="badge bg-success">Cash on Delivery</span>
                            <span th:if="${order.paymentMethod.name() == 'PAYPAL'}"
                                  class="badge bg-warning text-dark">PayPal</span>
                        </div>
                        <div th:if="${order.paypalTransactionId}" class="mb-2">
                            <small class="text-muted">Transaction ID</small><br>
                            <span class="small" th:text="${order.paypalTransactionId}">-</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>Total:</span>
                            <span class="text-primary" th:text="'€' + ${order.totalAmount}">€0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order Items -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header"><h5 class="mb-0">Items</h5></div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Subtotal</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td>
                                    <a th:href="@{/products/{id}(id=${item.product.id})}"
                                       th:text="${item.product.name}">Product</a>
                                </td>
                                <td th:text="'€' + ${item.priceAtPurchase}">€0.00</td>
                                <td th:text="${item.quantity}">1</td>
                                <td class="fw-semibold"
                                    th:text="'€' + ${item.priceAtPurchase * item.quantity}">€0.00</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

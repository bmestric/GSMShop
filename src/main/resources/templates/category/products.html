<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${category?.name} + ' - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/categories}">Categories</a></li>
            <li class="breadcrumb-item active" th:text="${category?.name}">Category</li>
        </ol>
    </nav>

    <h2 class="mb-4" th:text="${category?.name}">Category</h2>
    <p class="text-muted" th:text="${category?.description}">Description</p>

    <div class="row g-4">
        <div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${products}">
            <div class="card h-100 shadow-sm product-card">
                <div class="card-body d-flex flex-column">
                    <div class="text-center mb-3">
                        <i class="bi bi-phone fs-1 text-secondary"></i>
                    </div>
                    <h6 class="card-title" th:text="${product.name}">Product</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold text-primary" th:text="'€' + ${product.price}">€0.00</span>
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="btn btn-outline-primary btn-sm">View</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted fs-5">No products in this category yet.</p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

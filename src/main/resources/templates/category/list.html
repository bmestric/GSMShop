<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Categories - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4">All Categories</h2>
    <div class="row g-4">
        <div class="col-md-4 col-sm-6" th:each="category : ${categories}">
            <a th:href="@{/categories/{id}(id=${category.id})}" class="text-decoration-none">
                <div class="card h-100 shadow-sm category-card">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-grid-3x3-gap fs-1 text-primary"></i>
                        <h5 class="card-title mt-3" th:text="${category.name}">Category</h5>
                        <p class="card-text text-muted" th:text="${category.description}">Description</p>
                        <span class="badge bg-primary" th:text="${#lists.size(category.products)} + ' products'">0 products</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-5">
        <p class="text-muted fs-5">No categories available yet.</p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

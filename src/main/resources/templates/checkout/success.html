<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Order Confirmed - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-5">
    <div class="text-center">
        <i class="bi bi-check-circle text-success" style="font-size: 5rem;"></i>
        <h2 class="mt-3">Order Confirmed!</h2>
        <p class="text-muted fs-5">Thank you for your purchase.</p>

        <div class="card shadow-sm mx-auto mt-4" style="max-width: 500px;">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <span>Order ID:</span>
                    <span class="fw-bold" th:text="'#' + ${order.id}">-</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Payment:</span>
                    <span th:text="${order.paymentMethod.name()}">-</span>
                </div>
                <div th:if="${order.paypalTransactionId}" class="d-flex justify-content-between mb-2">
                    <span>PayPal Transaction:</span>
                    <span class="small" th:text="${order.paypalTransactionId}">-</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total:</span>
                    <span class="text-primary" th:text="'€' + ${order.totalAmount}">€0.00</span>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/order-history/{id}(id=${order.id})}" class="btn btn-primary">
                View Order Details
            </a>
            <a th:href="@{/products}" class="btn btn-outline-secondary ms-2">
                Continue Shopping
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

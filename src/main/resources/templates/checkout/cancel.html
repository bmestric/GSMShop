<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Payment Cancelled - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-5">
    <div class="text-center">
        <i class="bi bi-x-circle text-warning" style="font-size: 5rem;"></i>
        <h2 class="mt-3">Payment Cancelled</h2>
        <p class="text-muted fs-5">Your PayPal payment was cancelled. No charges were made.</p>
        <div class="mt-4">
            <a th:href="@{/checkout}" class="btn btn-primary">Try Again</a>
            <a th:href="@{/cart}" class="btn btn-outline-secondary ms-2">Back to Cart</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

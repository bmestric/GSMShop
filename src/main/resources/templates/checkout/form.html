<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Checkout - GSM Shop')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4">Checkout</h2>

    <div class="row">
        <!-- Order Summary -->
        <div class="col-md-7">
            <div class="card shadow-sm mb-4">
                <div class="card-header"><h5 class="mb-0">Order Items</h5></div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td th:text="${item.productName}">Product</td>
                            <td th:text="${item.quantity}">1</td>
                            <td th:text="'€' + ${item.price}">€0.00</td>
                            <td class="fw-semibold" th:text="'€' + ${item.subtotal}">€0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Payment Methods -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Payment</h5>
                    <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                        <span>Total:</span>
                        <span class="text-primary" th:text="'€' + ${cart.total}">€0.00</span>
                    </div>

                    <h6 class="mb-3">Select payment method:</h6>

                    <!-- Cash on Delivery -->
                    <form th:action="@{/checkout/cod}" method="post" class="mb-3">
                        <button type="submit" class="btn btn-success w-100 py-2">
                            <i class="bi bi-cash-stack"></i> Cash on Delivery
                        </button>
                    </form>

                    <!-- PayPal -->
                    <form th:action="@{/checkout/paypal/create}" method="post">
                        <button type="submit" class="btn btn-warning w-100 py-2">
                            <i class="bi bi-paypal"></i> Pay with PayPal
                        </button>
                    </form>

                    <a th:href="@{/cart}" class="btn btn-outline-secondary w-100 mt-3">
                        Back to Cart
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('GSM Shop - Home')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="flex-grow-1">
    <!-- Hero Section -->
    <section class="bg-primary text-white py-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Welcome to GSM Shop</h1>
            <p class="lead mt-3">Find the latest smartphones and accessories at the best prices</p>
            <a th:href="@{/products}" class="btn btn-light btn-lg mt-3">Browse Products</a>
        </div>
    </section>

    <!-- Categories Section -->
    <section class="container py-5">
        <h2 class="mb-4">Shop by Category</h2>
        <div class="row g-4">
            <div class="col-md-4 col-sm-6" th:each="category : ${categories}">
                <a th:href="@{/categories/{id}(id=${category.id})}" class="text-decoration-none">
                    <div class="card h-100 shadow-sm category-card">
                        <div class="card-body text-center py-4">
                            <i class="bi bi-grid-3x3-gap fs-1 text-primary"></i>
                            <h5 class="card-title mt-3" th:text="${category.name}">Category</h5>
                            <p class="card-text text-muted" th:text="${category.description}">Description</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Featured Products Section -->
    <section class="container pb-5">
        <h2 class="mb-4">Featured Products</h2>
        <div class="row g-4">
            <div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${featuredProducts}">
                <div class="card h-100 shadow-sm product-card">
                    <div class="card-body d-flex flex-column">
                        <div class="text-center mb-3">
                            <i class="bi bi-phone fs-1 text-secondary"></i>
                        </div>
                        <h6 class="card-title" th:text="${product.name}">Product</h6>
                        <p class="card-text text-muted small flex-grow-1"
                           th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                        <div class="mb-2" th:if="${product.stockQuantity <= 0}">
                            <span class="badge bg-danger">Out of Stock</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="fw-bold text-primary" th:text="'€' + ${product.price}">€0.00</span>
                            <div class="d-flex gap-1 align-items-center">
                                <form th:action="@{/cart/add}" method="post"
                                      class="d-flex align-items-center gap-1">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="number" name="quantity" value="1" min="1"
                                           th:max="${product.stockQuantity}"
                                           class="form-control form-control-sm"
                                           style="width: 55px;"
                                           th:disabled="${product.stockQuantity <= 0}">
                                    <button type="submit" class="btn btn-primary btn-sm"
                                            th:disabled="${product.stockQuantity <= 0}">
                                        <i class="bi bi-cart-plus"></i>
                                    </button>
                                </form>
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="btn btn-outline-primary btn-sm">View</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
